# nginx site config for archivesmeteo.pleymor.com
# Install: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
# then run `certbot --nginx -d archivesmeteo.pleymor.com` to add the TLS lines.
# The block below is the post-certbot result (TLS lines included).

server {
    server_name archivesmeteo.pleymor.com;
    root /var/www/archivesmeteo;
    index index.html;

    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Correct MIME type for the PWA manifest (empty types{} forces default_type)
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
    }

    # Service worker must always be revalidated so updates propagate
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # Hashed build assets are immutable -> cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/archivesmeteo.pleymor.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/archivesmeteo.pleymor.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = archivesmeteo.pleymor.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name archivesmeteo.pleymor.com;
    return 404; # managed by Certbot
}
